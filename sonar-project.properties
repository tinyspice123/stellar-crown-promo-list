# SonarCloud analysis settings. This project uses Automatic Analysis (no
# sonar-scanner step in CI), which still reads this file for properties
# like these - see .github/workflows/*.yml for the Python version this
# actually runs against in CI.
sonar.python.version=3.14

# Every tracked file is verified valid UTF-8 with no BOM (checked with
# `iconv -f UTF-8 -t UTF-8` over the whole repo). Declaring it explicitly
# stops the scanner from auto-detecting a charset - its sniffing heuristic
# can misjudge files that mix mostly-ASCII code with a handful of non-ASCII
# characters (£, em-dashes, curly quotes, the odd emoji), which describes
# nearly every file in this repo.
sonar.sourceEncoding=UTF-8
